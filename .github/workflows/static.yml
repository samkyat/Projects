# Simple workflow for deploying static content to GitHub Pages
name: Deploy Math Genius App to Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'Math Genius App/website/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      # Updated the URL so the GitHub repo links directly to the subfolder
      url: ${{ steps.deployment.outputs.page_url }}mathapp/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      # NEW STEP: Rearrange files into a subfolder before uploading
      - name: Prepare Subfolder
        run: |
          mkdir -p deploy_site/mathapp
          cp -r "Math Genius App/website/"* deploy_site/mathapp/
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Target the new parent directory we just created
          path: 'deploy_site'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
