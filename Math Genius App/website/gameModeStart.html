<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Mode</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/startPage.css" />
</head>
<body>
    <div class="container">
        <div id="startPage" class="flex-center flex-column">
            <div id="header">
                <a href="./home.html" class="btn">&lt; Back</a>
                <h2>Game Mode</h2>
            </div>
            <div id="main">
                <p>Endless mixed-operation challenges:<br><span>+ - x &divide;</span></p>
                <p>Answer as many questions as you can before ending the session.</p>
                <div id="diffSelector">
                    <p>Difficulty</p>
                    <label>
                        <input type="radio" name="Difficulty" id="Easy" value="Easy" checked>
                        Easy
                    </label>
                    <label>
                        <input type="radio" name="Difficulty" id="Medium" value="Medium">
                        Medium
                    </label>
                    <label>
                        <input type="radio" name="Difficulty" id="Hard" value="Hard">
                        Hard
                    </label>
                </div>
                <button class="btn" id="startGameBtn" type="button">Start Game</button>
            </div> 
        </div>
    </div>
    <script type="module" src="./js/GameModeStart.js"></script>
</body>
</html>
