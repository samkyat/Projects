<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/practice.css" />
</head>
<body>
    <div class="container">
        <div id="game" class="flex-center flex-column">
            <div id="header">
                <p id="score">Score: 0</p>
                <p id="progress">Question: 0 / 0</p>
            </div>
            <div id="main">
                <p id="question">45 x 3 = ?</p>
                <input type="text" inputmode="decimal" pattern="[0-9\-\+\.]*" name="answer" id="answer">
                <button type="button" id="submitBtn">Submit Answer</button>
                <p id="status"></p>
            </div>
        </div>
    </div>
    <script type="module" src="./js/PracticeApp.js"></script>
</body>
</html>
