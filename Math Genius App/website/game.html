<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/game.css" />
</head>
<body>
    <div class="container">
        <div id="game" class="flex-center flex-column">
            <div id="header">
                <p id="score">Score: 0</p>
                <p id="streak">Streak: 0</p>
                <button type="button" id="endBtn" class="btn">End Game</button>
            </div>
            <div id="main">
                <p id="question">45 x 3 = ?</p>
                <input type="number" name="answer" id="answer">
                <button type="submit" id="submitBtn">Submit Answer</button>
                <p id="status"></p>
            </div>
        </div>
    </div>
    <script type="module" src="./js/GameApp.js"></script>
</body>
</html>
