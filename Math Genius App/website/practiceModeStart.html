<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Mode</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/startPage.css" />
</head>
<body>
    <div class="container">
        <div id="startPage" class="flex-center flex-column">
            <div id="header">
                <a href="./index.html" class="btn">&lt; Back</a>
                <h2>Practice Setup</h2>
            </div>
            <div id="main">
                <div id="quesNumSelector">
                    <label for="quesNumInput">Number of Questions</label>
                    <div class="number-input-wrapper">
                        <button type="button" class="number-btn" id="quesNumDec" aria-label="Decrease number of questions">-</button>
                        <input type="number" name="quesNum" id="quesNumInput" min="1" max="50" step="1" value="5">
                        <button type="button" class="number-btn" id="quesNumInc" aria-label="Increase number of questions">+</button>
                    </div>
                </div>
                <div id="opSelector">
                    <p>Operations</p>
                    <label>
                        <input type="checkbox" id="addition" name="operation" value="addition">
                        Addition
                    </label>
                    <label>
                        <input type="checkbox" id="subtraction" name="operation" value="subtraction">
                        Subtraction
                    </label>
                    <label>
                        <input type="checkbox" id="multiplication" name="operation" value="multiplication">
                        Multiplication
                    </label>
                    <label>
                        <input type="checkbox" id="division" name="operation" value="division">
                        Division
                    </label>
                </div>
                <div id="rangeSelector">
                    <p>Question range</p>
                    <div class="range-inputs">
                        <label>
                            Min value
                            <input type="number" id="minValueInput" min="1" max="99" value="1">
                        </label>
                        <label>
                            Max value
                            <input type="number" id="maxValueInput" min="1" max="99" value="10">
                        </label>
                    </div>
                </div>
                <button class="btn" id="startPracticeBtn" type="button">Start Practice</button>
            </div>
        </div>
    </div>
    <script type="module" src="./js/PracticeModeStart.js"></script>
</body>
</html>
